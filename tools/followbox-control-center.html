<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FollowBox Local Console</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --ink: #18212b;
      --muted: #5c6976;
      --panel: rgba(255,255,255,0.88);
      --line: rgba(24,33,43,0.12);
      --accent: #0f7b5b;
      --accent-2: #ef6b3a;
      --deep: #203040;
      --warn: #a12f2f;
      --shadow: 0 18px 42px rgba(34, 41, 52, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(239,107,58,0.22), transparent 30%),
        radial-gradient(circle at top right, rgba(15,123,91,0.18), transparent 28%),
        linear-gradient(180deg, #fbf8f2 0%, #ece3d5 100%);
    }
    .shell {
      width: min(1280px, calc(100% - 28px));
      margin: 20px auto 36px;
    }
    .hero, .card {
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      background: var(--panel);
      backdrop-filter: blur(8px);
    }
    .hero {
      padding: 26px 30px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .hero p {
      margin: 0;
      max-width: 860px;
      color: var(--muted);
      line-height: 1.7;
    }
    .statusbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.76);
      font-size: 13px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 18px;
      margin-top: 18px;
    }
    .card {
      padding: 18px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    .stack {
      display: grid;
      gap: 10px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    input, textarea, button, select {
      font: inherit;
    }
    input, textarea, select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(24,33,43,0.14);
      background: rgba(255,255,255,0.92);
      color: var(--ink);
    }
    textarea {
      min-height: 82px;
      resize: vertical;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      cursor: pointer;
      color: white;
      background: var(--accent);
      box-shadow: 0 8px 20px rgba(15,123,91,0.26);
      transition: transform .15s ease, opacity .15s ease;
    }
    button.secondary {
      background: var(--deep);
      box-shadow: 0 8px 20px rgba(32,48,64,0.2);
    }
    button.warn {
      background: var(--accent-2);
      box-shadow: 0 8px 20px rgba(239,107,58,0.22);
    }
    button:disabled {
      opacity: 0.55;
      cursor: wait;
      transform: none;
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }
    .log {
      margin-top: 18px;
      min-height: 300px;
      padding: 16px;
      overflow: auto;
      white-space: pre-wrap;
      border-radius: 22px;
      border: 1px solid rgba(24,33,43,0.1);
      background: #111920;
      color: #dbe7f5;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.55;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }
    .result {
      min-height: 44px;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(24,33,43,0.12);
      background: rgba(255,255,255,0.72);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .result.ok {
      border-color: rgba(15,123,91,0.34);
      color: var(--accent);
    }
    .result.bad {
      border-color: rgba(161,47,47,0.34);
      color: var(--warn);
    }
    .health {
      display: grid;
      gap: 8px;
    }
    .health-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(24,33,43,0.1);
      background: rgba(255,255,255,0.75);
      font-size: 13px;
    }
    .ok { color: var(--accent); }
    .bad { color: var(--warn); }
    .mono { font-family: Consolas, "Courier New", monospace; }
    details.card summary {
      cursor: pointer;
      font-weight: 600;
      list-style: none;
    }
    details.card summary::-webkit-details-marker {
      display: none;
    }
    @media (max-width: 760px) {
      .shell { width: min(100% - 16px, 1280px); }
      .hero { padding: 22px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1 id="heroTitle">FollowBox</h1>
      <p id="heroDesc"></p>
      <div class="statusbar">
        <div class="pill"><span id="labelServer"></span> <span id="serverState" class="mono"></span></div>
        <div class="pill"><span id="labelRepo"></span> <span id="repoState" class="mono">--</span></div>
        <div class="pill"><span id="labelBranch"></span> <span id="branchState" class="mono">--</span></div>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h2 id="quickTitle"></h2>
        <div class="stack">
          <div class="actions">
            <button id="pushRepo" class="warn"></button>
            <button id="deployCloudAll" class="warn"></button>
            <button id="deployCloud"></button>
            <button id="publishCloudOta" class="secondary"></button>
          </div>
          <div class="actions">
            <button id="pullRepo" class="secondary"></button>
            <button id="uploadSerial"></button>
            <button id="uploadNetwork" class="secondary"></button>
            <button id="refreshStatus" class="secondary"></button>
          </div>
          <div class="hint" id="quickHint"></div>
          <div id="lastResult" class="result"></div>
        </div>
      </article>

      <article class="card">
        <h2 id="healthTitle"></h2>
        <div id="health" class="health"></div>
        <div class="hint" id="healthHint"></div>
      </article>
    </section>

    <details class="card" style="margin-top:18px;">
      <summary id="advancedSummary"></summary>
      <div class="grid" style="margin-top:14px;">
        <article class="card">
          <h2>Git</h2>
          <div class="stack">
            <label><span id="gitAddPathspecLabel"></span>
              <input id="gitAddPathspec" />
            </label>
            <label><span id="commitMessageLabel"></span>
              <textarea id="commitMessage"></textarea>
            </label>
            <div class="actions">
              <button id="gitStatus"></button>
              <button id="gitFetch" class="secondary">Fetch</button>
              <button id="gitPull" class="secondary">Pull</button>
              <button id="gitCommitPush" class="warn"></button>
            </div>
          </div>
        </article>

        <article class="card">
          <h2 id="otaBuildTitle"></h2>
          <div class="stack">
            <label><span id="otaVersionLabel"></span>
              <input id="otaVersion" />
            </label>
            <div class="actions">
              <button id="buildOta"></button>
            </div>
            <div class="hint" id="otaBuildHint"></div>
          </div>
        </article>
      </div>
    </details>

    <details class="card" style="margin-top:18px;">
      <summary id="defaultConfigSummary"></summary>
      <div class="grid" style="margin-top:14px;">
        <article class="card">
          <h2 id="localConfigTitle"></h2>
          <div class="stack">
            <label><span id="repoPathLabel"></span><input id="repoPath" /></label>
            <label><span id="gitUserNameLabel"></span><input id="gitUserName" /></label>
            <label><span id="gitUserEmailLabel"></span><input id="gitUserEmail" /></label>
            <label><span id="pioCommandLabel"></span><input id="pioCommand" /></label>
            <label><span id="firmwareEnvLabel"></span><input id="firmwareEnv" /></label>
            <label><span id="otaEnvLabel"></span><input id="otaEnv" /></label>
            <label><span id="serialPortLabel"></span><input id="serialPort" /></label>
            <label><span id="otaUploadPortLabel"></span><input id="otaUploadPort" /></label>
          </div>
        </article>
        <article class="card">
          <h2 id="cloudConfigTitle"></h2>
          <div class="stack">
            <label><span id="cloudPathLabel"></span><input id="cloudPath" /></label>
            <label><span id="cloudPemPathLabel"></span><input id="cloudPemPath" /></label>
            <label>Host<input id="cloudHost" /></label>
            <label>Port<input id="cloudPort" /></label>
            <label>User<input id="cloudUser" /></label>
            <label><span id="cloudRemoteDirLabel"></span><input id="cloudRemoteDir" /></label>
            <label><span id="cloudVerifyUrlLabel"></span><input id="cloudVerifyUrl" /></label>
          </div>
        </article>
      </div>
      <div class="actions" style="margin-top:12px;">
        <button id="saveConfig"></button>
      </div>
    </details>

    <section class="card" style="margin-top:18px;">
      <h2 id="logTitle"></h2>
      <div class="actions">
        <button class="secondary" id="clearLog"></button>
      </div>
      <pre id="log" class="log"></pre>
    </section>
  </main>

    function appendLog(title, data) {
      const stamp = new Date().toLocaleString();
      const lines = [`[${stamp}] ${title}`];
      if (typeof data === "string") {
        lines.push(data);
      } else if (data) {
        lines.push(JSON.stringify(data, null, 2));
      }
      logEl.textContent += lines.join("\n") + "\n\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    function shortText(value, limit = 1200) {
      const text = String(value || "").trim();
      if (text.length <= limit) return text;
      return `${text.slice(0, limit)}\n... (${text.length - limit} more chars)`;
    }

    function collectCommands(data, prefix = "") {
      const rows = [];
      if (!data || typeof data !== "object") return rows;
      if (typeof data.command === "string" && Object.prototype.hasOwnProperty.call(data, "exitCode")) {
        rows.push({ ...data, label: prefix || "command" });
      }
      for (const [key, value] of Object.entries(data)) {
        if (!value) continue;
        const label = prefix ? `${prefix}.${key}` : key;
        if (Array.isArray(value)) {
          value.forEach((item, index) => rows.push(...collectCommands(item, `${label}[${index}]`)));
        } else if (typeof value === "object") {
          rows.push(...collectCommands(value, label));
        }
      }
      return rows;
    }

    function summarizeResult(data) {
      const lines = [];
      if (!data || typeof data !== "object") return "";
      if (Object.prototype.hasOwnProperty.call(data, "ok")) {
        lines.push(`结果: ${data.ok ? t.lastResultOk : t.lastResultFail}`);
      }
      if (data.stage) lines.push(`阶段: ${data.stage}`);
      if (data.step) lines.push(`步骤: ${data.step}`);
      if (data.reason) lines.push(`原因: ${data.reason}`);
      if (data.error) lines.push(`错误: ${data.error}`);
      if (data.path) lines.push(`接口: ${data.path}`);
      const commands = collectCommands(data);
      if (commands.length) {
        lines.push("命令:");
        commands.forEach((cmd) => {
          lines.push(`- ${cmd.label}: exit ${cmd.exitCode} | ${cmd.command}`);
          if (cmd.stderr) lines.push(`  stderr: ${shortText(cmd.stderr, 500)}`);
          if (cmd.stdout) lines.push(`  stdout: ${shortText(cmd.stdout, 500)}`);
        });
      }
      if (data.details?.identity && (data.details.identity.effectiveName || data.details.identity.effectiveEmail)) {
        lines.push(`Git: ${data.details.identity.effectiveName || "--"} <${data.details.identity.effectiveEmail || "--"}>`);
      }
      return lines.join("\n");
    }

    function renderLastResult(title, data, blocked = false) {
      const ok = !!(data && data.ok);
      const state = blocked ? t.lastResultBlocked : (ok ? t.lastResultOk : t.lastResultFail);
      const summary = summarizeResult(data);
      lastResultEl.className = `result ${ok && !blocked ? "ok" : "bad"}`;
      lastResultEl.textContent = `${title}: ${state}${summary ? "\n" + summary : ""}`;
    }

    function isRepoDirty(git) {
      const status = String(git?.status || "").trim();
      if (!status) return false;
      const lines = status.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      return lines.some((line) => !line.startsWith("##"));
    }

    function summarizePreflight(data) {
      const lines = [];
      if (data.summary) lines.push(data.summary);
      if (Array.isArray(data.checks) && data.checks.length) {
        lines.push("检查项:");
        data.checks.forEach((item) => {
          const suffix = item.value ? ` (${item.value})` : "";
          lines.push(`- ${item.ok ? "OK" : "FAIL"} ${item.label}${suffix}`);
        });
      }
      if (Array.isArray(data.warnings) && data.warnings.length) {
        lines.push("提醒:");
        data.warnings.forEach((item) => lines.push(`- ${item}`));
      }
      if (data.details?.git?.files?.length) {
        lines.push("候选文件:");
        data.details.git.files.slice(0, 12).forEach((item) => {
          lines.push(`- ${item.status} ${item.path}`);
        });
        if (data.details.git.files.length > 12) {
          lines.push(`- ... 共 ${data.details.git.files.length} 个文件`);
        }
      }
      if (data.details?.serial?.matched?.name) {
        lines.push(`目标串口: ${data.details.serial.matched.name}`);
      }
      if (data.details?.network?.target) {
        lines.push(`OTA 目标: ${data.details.network.target}`);
      }
      if (data.details?.cloud) {
        lines.push(`云端目标: ${data.details.cloud.host}:${data.details.cloud.port} ${data.details.cloud.remoteDir}`);
      }
      return lines.join("\n");
    }

    async function runWithPreflight(button, title, action, path, bodyBuilder) {
      try {
        setBusy(button, true);
        const body = bodyBuilder ? bodyBuilder() : {};
        const preflightBody = { ...body, action };
        appendLog(`${title} -> ${t.preflightTitle}`, preflightBody);
        const preflight = await api("/api/preflight", preflightBody);
        appendLog(`${title} -> ${t.preflightTitle}`, preflight);
        if (!preflight.ok) {
          appendLog(`${title} -> ${t.preflightBlocked}`, summarizePreflight(preflight));
          renderLastResult(title, preflight, true);
          return;
        }
        const confirmed = window.confirm(`${summarizePreflight(preflight)}\n\n${t.confirmHint}\n${t.confirmContinue}`);
        if (!confirmed) {
          appendLog(`${title} -> 已取消`, "用户取消执行");
          return;
        }
        appendLog(`${title} -> ${t.logStart}`, body || "");
        const data = await api(path, body);
        appendLog(`${title} -> ${t.logDone}`, summarizeResult(data));
        appendLog(`${title} -> raw`, data);
        renderLastResult(title, data);
        if (data.git) {
          repoStateEl.textContent = isRepoDirty(data.git) ? t.stateDirty : t.stateClean;
          branchStateEl.textContent = data.git.branch || "--";
        }
        if (data.health) {
          renderHealth(data.health);
        }
        if (data.config) {
          applyConfig(data.config);
        }
        return data;
      } catch (error) {
        appendLog(`${title} -> ${t.logFail}`, error.data || error.message);
        renderLastResult(title, error.data || { ok: false, error: error.message });
      } finally {
        setBusy(button, false);
      }
    }

    function payload() {
      return {
        ...Object.fromEntries(ids.map((id) => [id, els[id].value])),
        commitMessage: document.getElementById("commitMessage").value
      };
    }

    function applyConfig(config) {
      ids.forEach((id) => {
        if (config[id] === undefined || config[id] === null) return;
        els[id].value = String(config[id]);
      });
    }

    function renderHealth(health) {
      const gitIdentityReady = !!(health.gitUserName && health.gitUserEmail);
      const gitIdentityText = gitIdentityReady
        ? `${health.gitUserName} <${health.gitUserEmail}>`
        : t.healthMissing;
      const rows = [
        [t.healthRepo, health.repoExists],
        [t.healthCloud, health.cloudExists],
        [t.healthFirmware, health.firmwareExists],
        [t.healthPem, health.pemExists],
        [t.healthPio, health.pioExists],
        [t.healthGitIdentity, gitIdentityText, gitIdentityReady],
        [t.healthSerial, health.serialPort || "--"],
        [t.healthOtaHost, health.otaUploadPort || "--"]
      ];
      healthEl.innerHTML = rows.map(([label, value, explicitOk]) => {
        const ok = typeof explicitOk === "boolean" ? explicitOk : (typeof value === "boolean" ? value : true);
        const text = typeof value === "boolean" ? (value ? t.healthReady : t.healthMissing) : value;
        return `<div class="health-item"><span>${label}</span><strong class="${ok ? "ok" : "bad"}">${text}</strong></div>`;
      }).join("");
    }

    async function api(path, body) {
      const resp = await fetch(path, {
        method: body ? "POST" : "GET",
        headers: body ? { "Content-Type": "application/json" } : undefined,
        body: body ? JSON.stringify(body) : undefined
      });
      const data = await resp.json();
      if (!resp.ok) {
        const error = new Error(data.error || `HTTP ${resp.status}`);
        error.data = data;
        throw error;
      }
      return data;
    }

    function setBusy(button, busy) {
      if (button) button.disabled = busy;
    }

    async function run(button, title, path, bodyBuilder) {
      try {
        setBusy(button, true);
        const body = bodyBuilder ? bodyBuilder() : null;
        appendLog(`${title} -> ${t.logStart}`, body || "");
        const data = await api(path, body);
        appendLog(`${title} -> ${t.logDone}`, summarizeResult(data));
        appendLog(`${title} -> raw`, data);
        renderLastResult(title, data);
        if (data.git) {
          repoStateEl.textContent = isRepoDirty(data.git) ? t.stateDirty : t.stateClean;
          branchStateEl.textContent = data.git.branch || "--";
        }
        if (data.health) {
          renderHealth(data.health);
        }
        if (data.config) {
          applyConfig(data.config);
        }
        return data;
      } catch (error) {
        appendLog(`${title} -> ${t.logFail}`, error.data || error.message);
        renderLastResult(title, error.data || { ok: false, error: error.message });
      } finally {
        setBusy(button, false);
      }
    }

    async function refreshStatus() {
      const data = await api("/api/state");
      applyConfig(data.config);
      repoStateEl.textContent = isRepoDirty(data.git) ? t.stateDirty : t.stateClean;
      branchStateEl.textContent = data.git.branch || "--";
      renderHealth(data.health);
      appendLog(t.initState, data);
    }

    buttons.refreshStatus.onclick = () => run(buttons.refreshStatus, t.refreshStatus, "/api/state");
    buttons.pushRepo.onclick = () => runWithPreflight(buttons.pushRepo, t.pushRepo, "git-commit-push", "/api/git/commit-push", payload);
    buttons.pullRepo.onclick = () => runWithPreflight(buttons.pullRepo, t.pullRepo, "git-pull-local", "/api/git/pull", payload);
    buttons.deployCloudAll.onclick = () => runWithPreflight(buttons.deployCloudAll, t.deployCloudAll, "deploy-cloud-all", "/api/cloud/deploy-all", payload);
    buttons.deployCloud.onclick = () => runWithPreflight(buttons.deployCloud, t.deployCloud, "cloud-deploy", "/api/cloud/deploy", payload);
    buttons.publishCloudOta.onclick = () => runWithPreflight(buttons.publishCloudOta, t.publishCloudOta, "ota-publish-cloud", "/api/ota/publish-cloud", payload);
    buttons.uploadSerial.onclick = () => runWithPreflight(buttons.uploadSerial, t.uploadSerial, "upload-serial", "/api/ota/upload-serial", payload);
    buttons.uploadNetwork.onclick = () => runWithPreflight(buttons.uploadNetwork, t.uploadNetwork, "upload-network", "/api/ota/upload-network", payload);
    buttons.gitStatus.onclick = () => run(buttons.gitStatus, t.gitStatus, "/api/git/status", payload);
    buttons.gitFetch.onclick = () => run(buttons.gitFetch, "Git Fetch", "/api/git/fetch");
    buttons.gitPull.onclick = () => runWithPreflight(buttons.gitPull, t.pullRepo, "git-pull-local", "/api/git/pull", payload);
    buttons.gitCommitPush.onclick = () => runWithPreflight(buttons.gitCommitPush, t.gitCommitPush, "git-commit-push", "/api/git/commit-push", payload);
    buttons.buildOta.onclick = () => run(buttons.buildOta, t.buildOta, "/api/ota/build", payload);
    buttons.saveConfig.onclick = () => run(buttons.saveConfig, t.saveConfig, "/api/config/save", payload);
    buttons.clearLog.onclick = () => { logEl.textContent = ""; };

    refreshStatus();
  </script>
</body>
</html>
