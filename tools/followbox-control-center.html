<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FollowBox Local Console</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --ink: #18212b;
      --muted: #5c6976;
      --panel: rgba(255,255,255,0.88);
      --line: rgba(24,33,43,0.12);
      --accent: #0f7b5b;
      --accent-2: #ef6b3a;
      --deep: #203040;
      --warn: #a12f2f;
      --shadow: 0 18px 42px rgba(34, 41, 52, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(239,107,58,0.22), transparent 30%),
        radial-gradient(circle at top right, rgba(15,123,91,0.18), transparent 28%),
        linear-gradient(180deg, #fbf8f2 0%, #ece3d5 100%);
    }
    .shell {
      width: min(1280px, calc(100% - 28px));
      margin: 20px auto 36px;
    }
    .hero, .card {
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      background: var(--panel);
      backdrop-filter: blur(8px);
    }
    .hero {
      padding: 26px 30px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .hero p {
      margin: 0;
      max-width: 860px;
      color: var(--muted);
      line-height: 1.7;
    }
    .statusbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.76);
      font-size: 13px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 18px;
      margin-top: 18px;
    }
    .card {
      padding: 18px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    .stack {
      display: grid;
      gap: 10px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    input, textarea, button, select {
      font: inherit;
    }
    input, textarea, select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(24,33,43,0.14);
      background: rgba(255,255,255,0.92);
      color: var(--ink);
    }
    textarea {
      min-height: 82px;
      resize: vertical;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      cursor: pointer;
      color: white;
      background: var(--accent);
      box-shadow: 0 8px 20px rgba(15,123,91,0.26);
      transition: transform .15s ease, opacity .15s ease;
    }
    button.secondary {
      background: var(--deep);
      box-shadow: 0 8px 20px rgba(32,48,64,0.2);
    }
    button.warn {
      background: var(--accent-2);
      box-shadow: 0 8px 20px rgba(239,107,58,0.22);
    }
    button:disabled {
      opacity: 0.55;
      cursor: wait;
      transform: none;
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }
    .log {
      margin-top: 18px;
      min-height: 300px;
      padding: 16px;
      overflow: auto;
      white-space: pre-wrap;
      border-radius: 22px;
      border: 1px solid rgba(24,33,43,0.1);
      background: #111920;
      color: #dbe7f5;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.55;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }
    .result {
      min-height: 44px;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(24,33,43,0.12);
      background: rgba(255,255,255,0.72);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .result.ok {
      border-color: rgba(15,123,91,0.34);
      color: var(--accent);
    }
    .result.bad {
      border-color: rgba(161,47,47,0.34);
      color: var(--warn);
    }
    .health {
      display: grid;
      gap: 8px;
    }
    .health-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(24,33,43,0.1);
      background: rgba(255,255,255,0.75);
      font-size: 13px;
    }
    .ok { color: var(--accent); }
    .bad { color: var(--warn); }
    .mono { font-family: Consolas, "Courier New", monospace; }
    details.card summary {
      cursor: pointer;
      font-weight: 600;
      list-style: none;
    }
    details.card summary::-webkit-details-marker {
      display: none;
    }
    @media (max-width: 760px) {
      .shell { width: min(100% - 16px, 1280px); }
      .hero { padding: 22px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1 id="heroTitle">FollowBox</h1>
      <p id="heroDesc"></p>
      <div class="statusbar">
        <div class="pill"><span id="labelServer"></span> <span id="serverState" class="mono"></span></div>
        <div class="pill"><span id="labelRepo"></span> <span id="repoState" class="mono">--</span></div>
        <div class="pill"><span id="labelBranch"></span> <span id="branchState" class="mono">--</span></div>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h2 id="quickTitle"></h2>
        <div class="stack">
          <div class="actions">
            <button id="pushRepo" class="warn"></button>
            <button id="deployCloudAll" class="warn"></button>
            <button id="deployCloud"></button>
            <button id="publishCloudOta" class="secondary"></button>
          </div>
          <div class="actions">
            <button id="pullRepo" class="secondary"></button>
            <button id="uploadSerial"></button>
            <button id="uploadNetwork" class="secondary"></button>
            <button id="refreshStatus" class="secondary"></button>
          </div>
          <div class="hint" id="quickHint"></div>
          <div id="lastResult" class="result"></div>
        </div>
      </article>

      <article class="card">
        <h2 id="healthTitle"></h2>
        <div id="health" class="health"></div>
        <div class="hint" id="healthHint"></div>
      </article>
    </section>

    <details class="card" style="margin-top:18px;">
      <summary id="advancedSummary"></summary>
      <div class="grid" style="margin-top:14px;">
        <article class="card">
          <h2>Git</h2>
          <div class="stack">
            <label><span id="gitAddPathspecLabel"></span>
              <input id="gitAddPathspec" />
            </label>
            <label><span id="commitMessageLabel"></span>
              <textarea id="commitMessage"></textarea>
            </label>
            <div class="actions">
              <button id="gitStatus"></button>
              <button id="gitFetch" class="secondary">Fetch</button>
              <button id="gitPull" class="secondary">Pull</button>
              <button id="gitCommitPush" class="warn"></button>
            </div>
          </div>
        </article>

        <article class="card">
          <h2 id="otaBuildTitle"></h2>
          <div class="stack">
            <label><span id="otaVersionLabel"></span>
              <input id="otaVersion" />
            </label>
            <div class="actions">
              <button id="buildOta"></button>
            </div>
            <div class="hint" id="otaBuildHint"></div>
          </div>
        </article>
      </div>
    </details>

    <details class="card" style="margin-top:18px;">
      <summary id="defaultConfigSummary"></summary>
      <div class="grid" style="margin-top:14px;">
        <article class="card">
          <h2 id="localConfigTitle"></h2>
          <div class="stack">
            <label><span id="repoPathLabel"></span><input id="repoPath" /></label>
            <label><span id="gitUserNameLabel"></span><input id="gitUserName" /></label>
            <label><span id="gitUserEmailLabel"></span><input id="gitUserEmail" /></label>
            <label><span id="pioCommandLabel"></span><input id="pioCommand" /></label>
            <label><span id="firmwareEnvLabel"></span><input id="firmwareEnv" /></label>
            <label><span id="otaEnvLabel"></span><input id="otaEnv" /></label>
            <label><span id="serialPortLabel"></span><input id="serialPort" /></label>
            <label><span id="otaUploadPortLabel"></span><input id="otaUploadPort" /></label>
          </div>
        </article>
        <article class="card">
          <h2 id="cloudConfigTitle"></h2>
          <div class="stack">
            <label><span id="cloudPathLabel"></span><input id="cloudPath" /></label>
            <label><span id="cloudPemPathLabel"></span><input id="cloudPemPath" /></label>
            <label>Host<input id="cloudHost" /></label>
            <label>Port<input id="cloudPort" /></label>
            <label>User<input id="cloudUser" /></label>
            <label><span id="cloudRemoteDirLabel"></span><input id="cloudRemoteDir" /></label>
            <label><span id="cloudVerifyUrlLabel"></span><input id="cloudVerifyUrl" /></label>
          </div>
        </article>
      </div>
      <div class="actions" style="margin-top:12px;">
        <button id="saveConfig"></button>
      </div>
    </details>

    <section class="card" style="margin-top:18px;">
      <h2 id="logTitle"></h2>
      <div class="actions">
        <button class="secondary" id="clearLog"></button>
      </div>
      <pre id="log" class="log"></pre>
    </section>
  </main>

  <script src="control-center/app.js"></script>
</body>
</html>
