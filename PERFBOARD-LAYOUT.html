<text x="124" y="31" font-size="4.2" font-weight="700" fill="#202428">Placement rules</text>
<text x="124" y="39" font-size="3.2" fill="#39404a">1. JY61P center is within 2.5mm of board center; keep it level and mark FRONT.</text>
<text x="124" y="47" font-size="3.2" fill="#39404a">2. UWB stays in the front-right RF corner; DC-DC stays rear-left; spacing check &gt;=50mm.</text>
<text x="124" y="55" font-size="3.2" fill="#39404a">3. All 5V-to-ESP32 inputs have independent dividers or level shifting.</text>
<text x="124" y="63" font-size="3.2" fill="#39404a">4. GPIO12/13/14/15/16/39 keep external 10k pulldowns near the output modules.</text>
<text x="124" y="71" font-size="3.2" fill="#39404a">5. Motor main current, controller BAT+/BAT-, phase wires and F1 never cross this board.</text>
<text x="124" y="79" font-size="3.2" fill="#39404a">6. GPIO21 reads only 3.3V from second NC contact or optocoupler isolation.</text>
<rect x="120" y="109" width="86" height="49" rx="2" fill="#fffaf0" stroke="#e3c36a"/>

<text x="152" y="125" font-size="3.2" fill="#5f4b1b">F1 main fuse, main switch, motor phase wires, controller BAT+/BAT-</text>
<text x="124" y="135" font-size="3.3" font-weight="700" fill="#5f4b1b">Rear harness:</text>
<text x="152" y="135" font-size="3.2" fill="#5f4b1b">BAT IN/F2, CTRL L/R, e-lock/ESTOP chain leave by rear edge</text>
<text x="124" y="145" font-size="3.3" font-weight="700" fill="#5f4b1b">Front/side ports:</text>
<text x="152" y="145" font-size="3.2" fill="#5f4b1b">TOF and ultrasonic modules may be panel-mounted; their JST headers are shown on the board</text>
<rect x="16" y="182" width="200" height="42" rx="2" fill="#ffffff" stroke="#d6d8dd"/>

<text x="20" y="197" font-size="3.4" fill="#39404a">- ESP32-S3-DevKitC-1, DC-DC 36V-&gt;5V, 5V/GND/3V3 bus, 470uF + 0.1uF filter cap</text>
<text x="20" y="203" font-size="3.4" fill="#39404a">- DS600 receiver with 5 independent PWM dividers; JY61P centered with optional TX divider</text>
<text x="20" y="209" font-size="3.4" fill="#39404a">- TCA9548A with 4.7k I2C pullups; front TOF headers/modules; left/right HC-SR04 ports and echo dividers</text>
<text x="20" y="215" font-size="3.4" fill="#39404a">- PWM-&gt;0-5V L/R modules; MOS/opto x4 driver board; BAT ADC 220k/10k; ESTOP feedback input</text>
<text x="20" y="221" font-size="3" fill="#6b7280">Generator validates: board bounds, component overlap, JY61P center, and UWB/DC-DC spacing.</text>
