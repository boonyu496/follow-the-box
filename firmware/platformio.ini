[platformio]
data_dir = web
default_envs = esp32-s3-devkitc-1

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; H5 control panel is served from LittleFS (firmware/web/ -> `pio run -t uploadfs`).
; Keep firmware/web as the single source of truth; firmware/data is legacy.
board_build.filesystem = littlefs
lib_deps =
  esp32async/ESPAsyncWebServer @ ^3.6.0
  esp32async/AsyncTCP @ ^3.3.2
  pololu/VL53L1X @ ^1.3.1
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D FOLLOWBOX_HW_V1=1
  -std=gnu++17
build_unflags =
  -std=gnu++11

[env:esp32-s3-devkitc-1]
; FollowBox target board:
; ESP32-S3-DevKitC-1-N32R16V / ESP32-S3-WROOM-2, 32 MB Octal flash
; + 16 MB Octal PSRAM. The default PlatformIO board definition is the
; 8 MB Quad-flash/no-PSRAM N8 variant, which boots as a flash-probe crash
; on N32R16V hardware before WiFi can start.
board_build.arduino.memory_type = opi_opi
board_build.boot = opi
board_build.flash_mode = dout
board_upload.flash_size = 32MB
board_build.partitions = partitions/ota_32MB.csv
build_flags =
  ${env.build_flags}
  -D BOARD_HAS_PSRAM

[env:esp32-s3-devkitc-1-n8]
; Explicit fallback for the older ESP32-S3-DevKitC-1-N8 (8 MB Quad flash,
; no PSRAM). Do not use this for N32R16V boards.
board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_build.partitions = partitions/ota_8MB.csv

[env:ota]
extends = env:esp32-s3-devkitc-1
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags =
  --port=3232
  --auth=followbox-ota
