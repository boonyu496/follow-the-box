apiVersion: v1
kind: Namespace
metadata:
  name: followbox-dev
  labels:
    app.kubernetes.io/name: followbox
    app.kubernetes.io/part-of: followbox
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: followbox-cloud
  namespace: followbox-dev
  labels:
    app.kubernetes.io/name: followbox-cloud
    app.kubernetes.io/part-of: followbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: followbox-cloud
  template:
    metadata:
      labels:
        app.kubernetes.io/name: followbox-cloud
        app.kubernetes.io/part-of: followbox
    spec:
      containers:
        - name: followbox-cloud
          image: ghcr.io/followbox/followbox-cloud:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: FOLLOWBOX_DEVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: followbox-cloud-secrets
                  key: FOLLOWBOX_DEVICE_TOKEN
                  optional: true
            - name: FOLLOWBOX_OPERATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: followbox-cloud-secrets
                  key: FOLLOWBOX_OPERATOR_TOKEN
                  optional: true
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: followbox-cloud
  namespace: followbox-dev
  labels:
    app.kubernetes.io/name: followbox-cloud
    app.kubernetes.io/part-of: followbox
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: followbox-cloud
  ports:
    - name: http
      port: 8080
      targetPort: http
